<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>BOYSINUNIFORMSWAG.PL</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E⬛%3C/text%3E%3C/svg%3E">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background-color: #0a0a0a;
      color: #d1d1d1;
      font-family: 'Courier New', 'JetBrains Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* SIDEBAR */
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 300px;
      height: 100%;
      background: rgba(8, 8, 8, 0.97);
      backdrop-filter: blur(16px);
      border-right: 1px solid rgba(255, 255, 255, 0.08);
      padding: 2.5rem 2rem;
      z-index: 100;
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    @media (max-width: 768px) {
      .sidebar {
        transform: translateX(-100%);
        width: 280px;
      }
      .sidebar.open {
        transform: translateX(0);
      }
      .main-content {
        margin-left: 0 !important;
      }
      .mobile-toggle {
        display: block !important;
      }
    }

    .mobile-toggle {
      display: none;
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 101;
      background: #0a0a0a;
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 0.6rem;
      cursor: pointer;
      font-size: 1.2rem;
      color: white;
      border-radius: 2px;
    }

    .main-content {
      margin-left: 300px;
      min-height: 100vh;
      padding: 2rem;
      opacity: 1;
      transform: translateY(0);
      transition:
        margin-left 0.3s ease,
        opacity 0.42s cubic-bezier(0.22, 1, 0.36, 1),
        transform 0.42s cubic-bezier(0.22, 1, 0.36, 1);
      will-change: opacity, transform;
    }

    .main-content.is-transitioning {
      opacity: 0;
      transform: translateY(12px);
    }

    @media (max-width: 768px) {
      .main-content {
        margin-left: 0;
        padding: 1rem;
      }
    }

    .nav-brand {
      margin-bottom: 3rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .nav-brand-title {
      font-size: 0.8rem;
      letter-spacing: 0.3em;
      color: #e0e0e0;
    }

    .nav-brand-version {
      font-size: 0.55rem;
      color: #444;
      margin-top: 0.4rem;
    }

    .nav-links {
      display: flex;
      flex-direction: column;
      gap: 1.8rem;
      margin: 2rem 0;
    }

    .nav-link {
      display: block;
      cursor: pointer;
      transition: all 0.25s ease;
      color: #777;
      text-decoration: none;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      padding: 0.2rem 0;
    }

    .nav-link:hover {
      color: white;
      transform: translateX(6px);
    }

    .nav-link small {
      display: block;
      font-size: 0.55rem;
      color: #444;
      margin-top: 0.2rem;
      letter-spacing: 0.05em;
    }

    .sidebar-footer {
      margin-top: auto;
      padding-top: 1.5rem;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      font-size: 0.55rem;
      color: #3a3a3a;
      line-height: 1.6;
    }

    /* KARTY PRODUKTÓW */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 2rem;
      margin-top: 2rem;
    }

    .product-card {
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.02);
      transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      overflow: hidden;
    }

    .product-card.clickable {
      cursor: pointer;
    }

    .product-card.clickable:hover {
      border-color: rgba(255, 255, 255, 0.35);
      transform: translateY(-4px);
    }

    .product-card.clickable:hover .card-img {
      filter: grayscale(0) !important;
      transform: scale(1.02);
    }

    .product-card.not-clickable {
      cursor: default;
    }

    .card-img {
      width: 100%;
      height: auto;
      aspect-ratio: 3/4;
      object-fit: cover;
      filter: contrast(1.06) saturate(0.94) brightness(0.96);
      transition: all 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }

    .product-info {
      padding: 1.2rem;
      position: relative;
    }

    .product-code {
      font-size: 0.6rem;
      color: #666;
      display: flex;
      justify-content: space-between;
      margin-bottom: 0.5rem;
    }

    .product-name {
      font-size: 0.9rem;
      letter-spacing: 0.12em;
      margin: 0.5rem 0;
      color: #ddd;
    }

    .product-price {
      font-size: 0.8rem;
      color: #8b0000;
    }

    .transmission-card {
      max-width: 620px;
      margin: 0 auto;
      padding: 3rem 1.5rem;
      min-height: 70vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .transmission-card p {
      max-width: 560px;
      color: #c8c8c8;
      font-size: 0.9rem;
      line-height: 1.8;
      margin-bottom: 1.8rem;
    }

    .transmission-btn {
      display: inline-block;
      border: 1px solid rgba(255, 255, 255, 0.35);
      color: white;
      text-decoration: none;
      padding: 0.9rem 1.4rem;
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      transition:
        border-color 0.25s ease,
        background 0.25s ease,
        transform 0.25s ease;
    }

    .transmission-btn:hover {
      border-color: white;
      background: rgba(255, 255, 255, 0.06);
      transform: translateY(-2px);
    }

    /* SZCZEGÓŁY PRODUKTU */
    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2.5rem;
      animation: fadeInUp 0.45s ease-out;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    .fade-in {
      animation: fadeIn 0.4s ease;
    }

    @media (max-width: 700px) {
      .detail-grid {
        grid-template-columns: 1fr;
        gap: 1.5rem;
      }
    }

    .detail-thumbnails {
      display: flex;
      gap: 0.75rem;
      margin-top: 1rem;
      flex-wrap: wrap;
    }

    .detail-thumb {
      width: 75px;
      height: 75px;
      object-fit: cover;
      cursor: pointer;
      border: 1px solid #333;
      transition: all 0.2s ease;
    }

    .detail-thumb:hover {
      border-color: #8b0000;
      transform: scale(0.98);
    }

    .detail-thumb.active {
      border-color: rgba(255, 255, 255, 0.7);
      filter: grayscale(0);
    }

    .product-image-main {
      width: 100%;
      display: block;
      aspect-ratio: 3 / 4;
      object-fit: cover;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 18px 55px rgba(0, 0, 0, 0.38);
      filter: contrast(1.04) saturate(0.96);
      opacity: 1;
      transform: scale(1);
      transition:
        opacity 0.48s cubic-bezier(0.22, 1, 0.36, 1),
        transform 0.48s cubic-bezier(0.22, 1, 0.36, 1),
        filter 0.48s ease;
      will-change: opacity, transform;
    }

    .product-image-main.is-switching {
      opacity: 0;
      transform: scale(0.992);
      filter: grayscale(0.2) brightness(0.82);
    }

    .order-btn {
      background: white;
      color: black;
      border: none;
      padding: 1rem;
      width: 100%;
      font-family: monospace;
      font-weight: bold;
      letter-spacing: 0.25em;
      cursor: pointer;
      margin-top: 1.2rem;
      transition: all 0.25s ease;
    }

    .order-btn:hover {
      background: #e0e0e0;
      letter-spacing: 0.3em;
    }

    .new-badge {
      background: #8b0000;
      color: white;
      font-size: 0.55rem;
      padding: 0.2rem 0.55rem;
      margin-left: 0.6rem;
      display: inline-block;
      letter-spacing: 0.05em;
    }

    .back-btn {
      background: none;
      border: none;
      color: #888;
      cursor: pointer;
      font-family: monospace;
      margin-bottom: 1.8rem;
      font-size: 0.7rem;
      transition: all 0.2s;
    }

    .back-btn:hover {
      color: white;
      transform: translateX(-3px);
    }

    /* STRONA GŁÓWNA */
    .home {
      text-align: center;
      padding: 3rem 1rem;
      min-height: 85vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      animation: fadeInUp 0.5s ease-out;
      position: relative;
      z-index: 2;
    }

    .home h1 {
      font-size: 2.8rem;
      font-weight: 300;
      letter-spacing: -0.02em;
      margin-bottom: 1rem;
    }

    .home p {
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      color: #777;
      max-width: 550px;
      margin: 0 auto;
      line-height: 1.6;
    }

    .home-description {
      max-width: 760px;
      margin: 2rem auto 0;
      text-align: left;
      color: #b8b8b8;
      font-size: 0.82rem;
      line-height: 1.85;
    }

    .home-description p {
      font-size: inherit;
      letter-spacing: 0;
      color: inherit;
      max-width: none;
      margin: 0 0 1rem;
    }

    .home-description p:last-child {
      margin-bottom: 0;
    }

    .home-description strong {
      color: #f0f0f0;
      font-weight: 700;
    }

    .home-highlight {
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding: 1.8rem 1rem;
      margin: 2rem auto;
      max-width: 520px;
      background: rgba(0, 0, 0, 0.3);
    }

    .home-btn {
      background: transparent;
      border: 1px solid #555;
      padding: 0.9rem 2rem;
      cursor: pointer;
      font-family: monospace;
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      color: white;
      margin-top: 0.8rem;
      transition: all 0.25s ease;
    }

    .home-btn:hover {
      border-color: white;
      background: rgba(255, 255, 255, 0.05);
      transform: scale(0.98);
    }

    /* TŁO WIDEO */
    .video-background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
      opacity: 0.4;
      filter: grayscale(0.7) brightness(0.5);
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    @media (prefers-reduced-motion: reduce) {
      html {
        scroll-behavior: auto;
      }

      .main-content,
      .product-image-main,
      .video-background,
      .fade-in,
      .home {
        animation: none !important;
        transition: none !important;
      }
    }

    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      background: #111;
      border: 1px solid #444;
      padding: 0.55rem 1.3rem;
      font-size: 0.7rem;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
      z-index: 1000;
      white-space: nowrap;
      font-family: monospace;
    }

    @media (max-width: 640px) {
      .toast {
        white-space: normal;
        width: 85%;
        text-align: center;
      }
      .home h1 {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>

<video id="bgVideo" class="video-background" autoplay muted loop playsinline style="opacity: 0.4;">
  <source src="https://ik.imagekit.io/t9r7oklnd4/0d33eccc-73e7-43b1-8213-5c9d8e8e0e45.mp4" type="video/mp4">
</video>

<button class="mobile-toggle" id="mobileToggle">☰</button>

<div class="sidebar" id="sidebar">
  <div class="nav-brand">
    <div class="nav-brand-title">BOYSINUNIFORMSWAG</div>
    <div class="nav-brand-version">VER_2.4.0_ARCHIVE</div>
  </div>

  <div class="nav-links">
    <div class="nav-link" data-page="home">
      INDEX
      <small>ROOT_DIR</small>
    </div>
    <div class="nav-link" data-page="archive">
      ARCHIVE
      <small>ENTRIES_ALL</small>
    </div>
    <div class="nav-link" data-page="instagram">
      TRANSMISSION
      <small>CONTACT_CH</small>
    </div>
  </div>

  <div class="sidebar-footer">
    LOCATION: [REDACTED]<br>
    STATUS: ENCRYPTED<br>
    © 2024 BIU_SWAG
  </div>
</div>

<main class="main-content" id="mainContent"></main>
<div class="toast" id="toast">↝ REDIRECTING TO EXTERNAL CHANNEL</div>

<script>
  // ==================== DANE ====================
  const PRODUCT = {
    id: "07",
    name: "Reconstructed Medical Supply Uniform",
    code: "ARC_MD_001",
    price: "280.00 PLN",
    images: [
      <img src="b9ea78a1-11e3-4a1c-86ad-d07dced5ea1c.jpg">
      <img src="99b3731d-f26a-481a-9b5a-a7b9ad081bf3.jpg">
    ],
    description: "Constructed from reclaimed medical supply bags - reassembled into functional uniform form.",
    specs: ["HEAVY MATERIAL", "RECLAIMED MEDICAL SUPPLY BAGS", "REASSEMBLED", "UNISEX", "LIMITED RUN"],
    isNew: true
  };

  // ==================== POMOCNICZE ====================
  function showToast() {
    const toast = document.getElementById('toast');
    toast.style.opacity = '1';
    setTimeout(() => {
      toast.style.opacity = '0';
    }, 1200);
  }

  function redirectToInstagram() {
    showToast();
    window.open('https://www.instagram.com/boysinuniformswag.pl/', '_blank', 'noopener,noreferrer');
  }

  function closeSidebarOnMobile() {
    if (window.innerWidth <= 768) {
      sidebar.classList.remove('open');
    }
  }

  const mobileToggle = document.getElementById('mobileToggle');
  const sidebar = document.getElementById('sidebar');
  if (mobileToggle) {
    mobileToggle.addEventListener('click', () => {
      sidebar.classList.toggle('open');
    });
  }

  const bgVideo = document.getElementById('bgVideo');

  // ==================== RENDER ====================
  function renderHome() {
    if (bgVideo) {
      bgVideo.style.opacity = '0.4';
      bgVideo.play().catch(e => console.log("Autoplay:", e));
    }
    return `
      <div class="home">
        <h1>BOYSINUNIFORM</h1>
        <p>MADE IN POLAND // MILITARY ARCHIVE RECONSTRUCTION</p>

        <div class="home-description">
          <p><strong>Boys in Uniform</strong> to polska marka reinterpretująca militaria poprzez modę. Każdy projekt powstaje z autentycznych elementów wyposażenia wojskowego, przekształconych w limitowane ubrania łączące funkcjonalność, rzemiosło i awangardową estetykę.</p>
          <p>W centrum marki znajduje się proces rekonstrukcji materiałów zaprojektowanych z myślą o służbie otrzymują nowe życie jako współczesna odzież. Każdy egzemplarz zachowuje ślady swojego pochodzenia, dzięki czemu nie istnieją dwie identyczne sztuki.</p>
          <p>Boys in Uniform czerpie inspirację z wojskowej użyteczności, archiwalnej odzieży i nowoczesnej sylwetki. Surowe tkaniny, dopracowana konstrukcja i ograniczona liczba egzemplarzy sprawiają, że każdy projekt jest czymś więcej niż ubraniem gdyż staje się przedmiotem z historią i własnym charakterem.</p>
          <p>Marka nie podąża za sezonowymi trendami. Tworzy kolekcje dla osób, które szukają autentyczności, jakości wykonania i odważnego wzornictwa, łącząc świat militariów z nowoczesną modą.</p>
        </div>
        
        <div class="home-highlight">
          <div style="margin-bottom: 0.7rem;">
            <span style="background: #8b0000; color: white; font-size: 0.6rem; padding: 0.2rem 0.7rem;">NEW ITEMS</span>
          </div>
          <div style="font-size: 1rem; letter-spacing: 0.08em; margin: 0.6rem 0;">RECONSTRUCTED MEDICAL SUPPLY UNIFORM</div>
          <button class="home-btn" id="viewOfferBtn">VIEW OFFER →</button>
        </div>
      </div>
    `;
  }

  function renderArchive() {
    if (bgVideo) bgVideo.style.opacity = '0';
    
    // Karta głównego produktu
    const mainProductCard = `
      <div class="product-card clickable" data-id="${PRODUCT.id}">
        <img src="${PRODUCT.images[0]}" class="card-img" loading="lazy">
        <div class="product-info">
          <div class="product-code">
            <span>${PRODUCT.code}</span>
            ${PRODUCT.isNew ? '<span class="new-badge">NEW</span>' : ''}
          </div>
          <div class="product-name">${PRODUCT.name.toUpperCase()}</div>
          <div class="product-price">${PRODUCT.price}</div>
        </div>
      </div>
    `;
    
    return `
      <div>
        <div style="margin-bottom: 2rem;">
          <div style="font-size: 0.65rem; color: #666; letter-spacing: 0.2em;">ARCHIVE_INDEX</div>
          <div style="font-size: 2.4rem; font-weight: 300; letter-spacing: 0.08em;">UNIFORMS</div>
        </div>
        
        <div class="product-grid">
          ${mainProductCard}
        </div>
        
        <div style="margin-top: 3rem; font-size: 0.55rem; color: #333; text-align: center;">END_OF_TRANSMISSION</div>
      </div>
    `;
  }

  function renderTransmission() {
    if (bgVideo) bgVideo.style.opacity = '0';

    return `
      <div class="transmission-card fade-in">
        <p>Każde zamówienie realizujemy indywidualnie. Kliknij poniżej, aby przejść na nasz Instagram i skontaktować się z nami w wiadomości prywatnej.</p>
        <a class="transmission-btn" href="https://www.instagram.com/boysinuniformswag.pl/" target="_blank" rel="noopener noreferrer">PRZEJDŹ NA INSTAGRAM</a>
      </div>
    `;
  }

  function renderEntry() {
    if (bgVideo) bgVideo.style.opacity = '0';
    const p = PRODUCT;
    
    let thumbsHtml = '';
    for (let i = 0; i < p.images.length; i++) {
      thumbsHtml += `<img class="detail-thumb" src="${p.images[i]}" data-img="${p.images[i]}">`;
    }
    
    let specsHtml = '';
    for (const spec of p.specs) {
      specsHtml += `<li style="margin-bottom: 0.4rem;">› ${spec}</li>`;
    }
    
    return `
      <div class="fade-in">
        <button class="back-btn" id="backToArchiveBtn">← BACK TO ARCHIVE</button>
        
        <div class="detail-grid">
          <div>
            <img id="mainProductImage" class="product-image-main" src="${p.images[0]}" alt="${p.name}">
            <div class="detail-thumbnails">
              ${thumbsHtml}
            </div>
          </div>
          
          <div>
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 1rem;">
              <span style="font-size: 0.65rem; color: #666;">FILE_ID: ${p.code}</span>
              <span style="font-size: 0.65rem; color: #8b0000; border: 1px solid rgba(139,0,0,0.3); padding: 0.1rem 0.5rem;">AUTHORIZED</span>
            </div>
            
            <h1 style="font-size: 1.4rem; margin-bottom: 0.6rem;">
              ${p.name.toUpperCase()}
              ${p.isNew ? '<span class="new-badge">NEW ITEMS</span>' : ''}
            </h1>
            
            <div style="font-size: 1.2rem; margin-bottom: 1.5rem;">${p.price}</div>
            
            <div style="margin-bottom: 1.5rem;">
              <strong style="font-size: 0.6rem; letter-spacing: 0.1em;">DESCRIPTION</strong>
              <p style="font-size: 0.8rem; margin-top: 0.4rem; line-height: 1.45;">${p.description}</p>
            </div>
            
            <div style="margin-bottom: 1.5rem;">
              <strong style="font-size: 0.6rem; letter-spacing: 0.1em;">SPECIFICATIONS</strong>
              <ul style="list-style: none; margin-top: 0.5rem; font-size: 0.7rem;">
                ${specsHtml}
              </ul>
            </div>
            
            <button class="order-btn" id="orderActionBtn">INITIATE ACQUISITION</button>
            <div style="font-size: 0.55rem; text-align: center; color: #444; margin-top: 1rem;">ENCRYPTED TRANSACTION PROTOCOL VIA EXTERNAL TERMINAL</div>
          </div>
        </div>
      </div>
    `;
  }

  // ==================== ROUTING ====================
  let pageTransitionTimer = null;

  function setPage(page, entryId = null) {
    const main = document.getElementById('mainContent');

    if (pageTransitionTimer) {
      clearTimeout(pageTransitionTimer);
    }

    main.classList.add('is-transitioning');

    pageTransitionTimer = setTimeout(() => {
      if (page === 'home') {
        main.innerHTML = renderHome();
        const viewOfferBtn = document.getElementById('viewOfferBtn');

        if (viewOfferBtn) viewOfferBtn.addEventListener('click', () => setPage('entry'));
      }
      else if (page === 'archive') {
        main.innerHTML = renderArchive();
        const clickableCard = document.querySelector('.product-card.clickable');
        if (clickableCard) {
          clickableCard.addEventListener('click', () => setPage('entry'));
        }
      }
      else if (page === 'instagram') {
        main.innerHTML = renderTransmission();
      }
      else if (page === 'entry') {
        main.innerHTML = renderEntry();
        const backBtn = document.getElementById('backToArchiveBtn');
        const orderBtn = document.getElementById('orderActionBtn');
        const mainImg = document.getElementById('mainProductImage');
        
        if (backBtn) backBtn.addEventListener('click', () => setPage('archive'));
        if (orderBtn) orderBtn.addEventListener('click', redirectToInstagram);
        
        const thumbs = document.querySelectorAll('.detail-thumb');
        if (thumbs[0]) thumbs[0].classList.add('active');
        let imageSwitching = false;
        thumbs.forEach(thumb => {
          thumb.addEventListener('click', () => {
            const newSrc = thumb.getAttribute('data-img');
            if (imageSwitching || !mainImg || !newSrc || mainImg.src === newSrc) {
              return;
            }

            imageSwitching = true;

            const nextImage = new Image();
            nextImage.onload = () => {
              mainImg.classList.add('is-switching');

              const swapImage = () => {
                mainImg.src = newSrc;
                thumbs.forEach(item => item.classList.remove('active'));
                thumb.classList.add('active');

                requestAnimationFrame(() => {
                  mainImg.classList.remove('is-switching');
                  window.setTimeout(() => {
                    imageSwitching = false;
                  }, 480);
                });
              };

              mainImg.addEventListener('transitionend', swapImage, { once: true });
              window.setTimeout(() => {
                if (imageSwitching && mainImg.classList.contains('is-switching')) {
                  swapImage();
                }
              }, 520);
            };
            nextImage.onerror = () => {
              imageSwitching = false;
              mainImg.classList.remove('is-switching');
            };
            nextImage.src = newSrc;
          });
        });
      }
      window.scrollTo({ top: 0, behavior: 'smooth' });
      requestAnimationFrame(() => {
        main.classList.remove('is-transitioning');
      });
    }, 180);
    
    closeSidebarOnMobile();
  }

  // ==================== NAWIGACJA ====================
  const navLinks = document.querySelectorAll('.nav-link');
  navLinks.forEach(link => {
    link.addEventListener('click', () => {
      const page = link.getAttribute('data-page');
      if (page === 'home') setPage('home');
      else if (page === 'archive') setPage('archive');
      else if (page === 'instagram') setPage('instagram');
    });
  });

  setPage('home');
</script>
</body>
</html>
